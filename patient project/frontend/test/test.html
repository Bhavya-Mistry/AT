<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediConnect</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        /* ── RESET & TOKENS ───────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0d0f;
            --surf: #111518;
            --surf2: #161b1f;
            --border: #1f2a30;
            --primary: #00c8a0;
            --purple: #a78bfa;
            --amber: #f5a623;
            --red: #ff4d6d;
            --txt: #e4eaee;
            --txt2: #7a909e;
            --radius: 10px;
            --sidebar-w: 240px;
        }

        body {
            background: var(--bg);
            color: var(--txt);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            min-height: 100vh;
        }

        /* ── UTILS ───────────────────────────────────────── */
        .hidden {
            display: none !important;
        }

        .flex {
            display: flex;
        }

        .col {
            flex-direction: column;
        }

        .center {
            align-items: center;
            justify-content: center;
        }

        .gap4 {
            gap: 4px;
        }

        .gap8 {
            gap: 8px;
        }

        .gap12 {
            gap: 12px;
        }

        .gap16 {
            gap: 16px;
        }

        .gap24 {
            gap: 24px;
        }

        .w100 {
            width: 100%;
        }

        .spin {
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .fade-in {
            animation: fadeIn .3s ease forwards;
        }

        /* ── FORMS ───────────────────────────────────────── */
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--txt2);
            margin-bottom: 6px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--txt2);
            pointer-events: none;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: var(--surf2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--txt);
            font-family: inherit;
            font-size: 14px;
            padding: 11px 14px;
            outline: none;
            transition: border-color .2s;
        }

        .input-wrap input,
        .input-wrap select {
            padding-left: 38px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        input::placeholder,
        textarea::placeholder {
            color: var(--txt2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* ── BUTTONS ─────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 20px;
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, background .2s;
            text-decoration: none;
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
        }

        .btn-primary:hover:not(:disabled) {
            opacity: .88;
        }

        .btn-secondary {
            background: var(--surf2);
            color: var(--txt);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--surf);
        }

        .btn-danger {
            background: rgba(255, 77, 109, .12);
            color: var(--red);
        }

        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 77, 109, .22);
        }

        .btn-ghost {
            background: transparent;
            color: var(--txt2);
        }

        .btn-ghost:hover {
            color: var(--txt);
            background: var(--surf2);
        }

        .btn-sm {
            padding: 7px 14px;
            font-size: 13px;
        }

        .btn-full {
            width: 100%;
        }

        .spinner-btn {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-top-color: #fff;
            border-radius: 50%;
        }

        /* ── CARDS ───────────────────────────────────────── */
        .card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }

        /* ── ALERTS ──────────────────────────────────────── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
        }

        .alert-error {
            background: rgba(255, 77, 109, .1);
            border: 1px solid rgba(255, 77, 109, .2);
            color: var(--red);
        }

        .alert-success {
            background: rgba(0, 200, 160, .1);
            border: 1px solid rgba(0, 200, 160, .2);
            color: var(--primary);
        }

        /* ── BADGE ───────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-green {
            background: rgba(0, 200, 160, .12);
            color: var(--primary);
        }

        .badge-amber {
            background: rgba(245, 166, 35, .12);
            color: var(--amber);
        }

        .badge-red {
            background: rgba(255, 77, 109, .12);
            color: var(--red);
        }

        .badge-purple {
            background: rgba(167, 139, 250, .12);
            color: var(--purple);
        }

        /* ══════════════════════════════════════════════════
     AUTH PAGE
  ══════════════════════════════════════════════════ */
        #page-auth {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 0 0 48%;
            background: var(--surf2);
            display: none;
            position: relative;
            overflow: hidden;
        }

        @media(min-width:900px) {
            .auth-left {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .auth-left-inner {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
        }

        .auth-left h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 52px;
            color: var(--txt);
            margin-bottom: 16px;
        }

        .auth-left p {
            font-size: 16px;
            color: var(--txt2);
            max-width: 360px;
            line-height: 1.6;
        }

        .auth-blob1 {
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: rgba(0, 200, 160, .08);
        }

        .auth-blob2 {
            position: absolute;
            top: -40px;
            right: -40px;
            width: 180px;
            height: 180px;
            border-radius: 16px;
            background: rgba(167, 139, 250, .08);
            transform: rotate(30deg);
        }

        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }

        .auth-box {
            width: 100%;
            max-width: 400px;
        }

        .auth-box h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .auth-box .subtitle {
            color: var(--txt2);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .auth-form-fields {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .auth-divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid var(--border);
        }

        .auth-divider span {
            font-size: 13px;
            color: var(--txt2);
            white-space: nowrap;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--txt2);
        }

        .auth-toggle button {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .eye-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--txt2);
            cursor: pointer;
            padding: 0;
        }

        /* ══════════════════════════════════════════════════
     APP SHELL (sidebar + topbar + main)
  ══════════════════════════════════════════════════ */
        #page-app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR */
        #sidebar {
            width: var(--sidebar-w);
            background: var(--surf2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 200;
            transform: translateX(-100%);
            transition: transform .25s ease;
        }

        #sidebar.open {
            transform: translateX(0);
        }

        @media(min-width:1024px) {
            #sidebar {
                transform: translateX(0);
                position: static;
            }
        }

        .sidebar-logo {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-logo span {
            font-family: 'DM Serif Display', serif;
            font-size: 20px;
            color: var(--txt);
        }

        .sidebar-user {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 200, 160, .15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: var(--primary);
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar-user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--txt);
        }

        .sidebar-user-role {
            font-size: 12px;
            color: var(--txt2);
            text-transform: capitalize;
        }

        #sidebar nav {
            flex: 1;
            padding: 12px 10px;
            overflow-y: auto;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius);
            color: var(--txt2);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            transition: all .15s;
            margin-bottom: 2px;
        }

        .nav-link:hover {
            color: var(--txt);
            background: var(--surf);
        }

        .nav-link.active {
            color: var(--primary);
            background: rgba(0, 200, 160, .1);
            border-left: 3px solid var(--primary);
        }

        .nav-link svg {
            width: 17px;
            height: 17px;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 12px 10px;
            border-top: 1px solid var(--border);
        }

        #sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 199;
        }

        #sidebar-overlay.show {
            display: block;
        }

        @media(min-width:1024px) {
            #sidebar-overlay {
                display: none !important;
            }
        }

        /* TOPBAR */
        #topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surf2);
            border-bottom: 1px solid var(--border);
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-menu-btn {
            display: flex;
            background: none;
            border: none;
            color: var(--txt2);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
        }

        .topbar-menu-btn:hover {
            background: var(--surf);
            color: var(--txt);
        }

        @media(min-width:1024px) {
            .topbar-menu-btn {
                display: none;
            }
        }

        #topbar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--txt);
        }

        .topbar-spacer {
            flex: 1;
        }

        .topbar-notif {
            background: none;
            border: none;
            color: var(--txt2);
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            position: relative;
        }

        .notif-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 8px;
            height: 8px;
            background: var(--amber);
            border-radius: 50%;
        }

        /* MAIN CONTENT */
        #app-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        #app-main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        @media(min-width:1024px) {
            #app-main {
                padding: 28px 32px;
            }
        }

        /* ══════════════════════════════════════════════════
     DASHBOARD
  ══════════════════════════════════════════════════ */
        .welcome-card {
            background: linear-gradient(135deg, rgba(0, 200, 160, .12) 0%, rgba(167, 139, 250, .08) 100%);
            border: 1px solid rgba(0, 200, 160, .2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .welcome-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .welcome-card p {
            color: var(--txt2);
            font-size: 14px;
        }

        .quick-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr;
            margin-bottom: 24px;
        }

        @media(min-width:600px) {
            .quick-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .quick-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background .2s;
            text-decoration: none;
            color: inherit;
        }

        .quick-card:hover {
            background: var(--surf2);
        }

        .quick-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .quick-icon svg {
            width: 22px;
            height: 22px;
        }

        .quick-card h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .quick-card p {
            font-size: 12px;
            color: var(--txt2);
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px;
            background: var(--surf2);
            border-radius: var(--radius);
            margin-bottom: 8px;
        }

        .notif-dot2 {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .notif-item p {
            font-size: 13px;
            color: var(--txt);
        }

        .notif-item span {
            font-size: 11px;
            color: var(--txt2);
        }

        .stats-grid {
            display: grid;
            gap: 14px;
            grid-template-columns: 1fr;
            margin-bottom: 24px;
        }

        @media(min-width:600px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .stat-card {
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .stat-val {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            color: var(--txt2);
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 20px;
            height: 20px;
        }

        /* ══════════════════════════════════════════════════
     CHAT
  ══════════════════════════════════════════════════ */
        #page-chat-inner {
            display: flex;
            height: 100%;
            gap: 0;
            overflow: hidden;
        }

        .chat-sidebar {
            width: 260px;
            background: var(--surf);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .chat-sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .chat-history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .chat-hist-item {
            padding: 10px 12px;
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 4px;
            transition: background .15s;
        }

        .chat-hist-item:hover {
            background: var(--surf2);
        }

        .chat-hist-item.active {
            background: rgba(0, 200, 160, .1);
        }

        .chat-hist-item p {
            font-size: 13px;
            font-weight: 500;
            color: var(--txt);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-hist-item span {
            font-size: 11px;
            color: var(--txt2);
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--surf);
            flex-shrink: 0;
        }

        .chat-bot-icon {
            width: 38px;
            height: 38px;
            background: rgba(0, 200, 160, .12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-bot-icon svg {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            display: flex;
            max-width: 72%;
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.bot {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.55;
        }

        .msg.user .msg-bubble {
            background: var(--primary);
            color: var(--bg);
            border-bottom-right-radius: 3px;
        }

        .msg.bot .msg-bubble {
            background: var(--surf);
            border: 1px solid var(--border);
            color: var(--txt);
            border-bottom-left-radius: 3px;
        }

        .msg-time {
            font-size: 11px;
            margin-top: 4px;
            text-align: right;
        }

        .msg.user .msg-time {
            color: rgba(10, 13, 15, .6);
        }

        .msg.bot .msg-time {
            color: var(--txt2);
        }

        .typing-dots {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 14px;
            background: var(--surf);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 3px;
            width: fit-content;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--txt2);
            border-radius: 50%;
            animation: dot-bounce .8s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: .15s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: .3s;
        }

        @keyframes dot-bounce {

            0%,
            80%,
            100% {
                transform: translateY(0)
            }

            40% {
                transform: translateY(-6px)
            }
        }

        .chat-input-area {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            background: var(--surf);
            flex-shrink: 0;
        }

        .chat-input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .chat-input-row textarea {
            flex: 1;
            min-height: 42px;
            max-height: 120px;
            padding: 10px 14px;
            border-radius: var(--radius);
        }

        .chat-action-btn {
            background: none;
            border: none;
            color: var(--txt2);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all .15s;
            flex-shrink: 0;
        }

        .chat-action-btn:hover {
            background: var(--surf2);
            color: var(--txt);
        }

        .chat-action-btn svg {
            width: 18px;
            height: 18px;
            display: block;
        }

        .send-btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            padding: 10px 14px;

    <script>
        /* ════════════════════════════════════════════════
           GLOBALS & STATE
        ════════════════════════════════════════════════ */
        const API = 'http://127.0.0.1:8000';
        let currentUser = null;   // { user_id, email, role }
        let currentPage = '';
        let chatSessionId = null;

        /* ════════════════════════════════════════════════
           API HELPERS
        ════════════════════════════════════════════════ */
        function getToken() { return localStorage.getItem('jwt_token'); }
        function setToken(t) { localStorage.setItem('jwt_token', t); }
        function clearToken() { localStorage.removeItem('jwt_token'); }

        async function apiFetch(path, opts = {}) {
            const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
            const token = getToken();
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(API + path, { ...opts, headers });
            if (res.status === 401) { doLogout(); throw new Error('Unauthorized'); }
            if (!res.ok) {
                let msg = 'Request failed';
                try { const d = await res.json(); msg = d.detail || JSON.stringify(d); } catch (e) { }
                throw new Error(msg);
            }
            if (res.status === 204) return null;
            return res.json();
        }

        /* ════════════════════════════════════════════════
           JWT DECODE
        ════════════════════════════════════════════════ */
        function decodeJwt(token) {
            try {
                const payload = token.split('.')[1];
                const decoded = JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
                return decoded;
            } catch (e) { return null; }
        }

        /* ════════════════════════════════════════════════
           AUTH FUNCTIONS
        ════════════════════════════════════════════════ */
        function showAuthAlert(msg) {
            const el = document.getElementById('auth-alert');
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function hideAuthAlert() {
            document.getElementById('auth-alert').classList.add('hidden');
        }

        function toggleEye(inputId, btn) {
            const inp = document.getElementById(inputId);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        function switchAuth(mode) {
            hideAuthAlert();
            document.getElementById('auth-login-view').classList.toggle('hidden', mode !== 'login');
            document.getElementById('auth-register-view').classList.toggle('hidden', mode !== 'register');
        }

        async function doLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showAuthAlert('Please fill in all fields.'); return; }

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner-btn spin"></div> Signing in…';
            hideAuthAlert();

            try {
                // ✅ /login uses OAuth2PasswordRequestForm — must send form-urlencoded, field is "username"
                const body = new URLSearchParams({ username: email, password });
                const res = await fetch(API + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body.toString()
                });

                if (!res.ok) {
                    let msg = 'Invalid email or password';
                    try { const d = await res.json(); msg = d.detail || msg; } catch (e) { }
                    throw new Error(msg);
                }

                const data = await res.json();
                setToken(data.access_token);

                const payload = decodeJwt(data.access_token);
                currentUser = { user_id: payload.user_id, email: payload.email, role: payload.role };

                launchApp();
            } catch (e) {
                showAuthAlert(e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg> Sign In`;
            }
        }

            </div>

              oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
            <button class="send-btn" id="chat-send-btn" onclick="sendChatMsg()">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>`;

            // Load existing messages if any
            if (sessions.length) {
                const existing = sessions.find(s => s.session_id === chatSessionId);
                if (existing && existing.messages && existing.messages.length) {
                    const container = document.getElementById('chat-messages');
                    container.innerHTML = '';
                    existing.messages.forEach(m => appendChatMsg(m.sender === 'patient' ? 'user' : 'bot', m.text));
                }

        function newChatSession() {
            chatSessionId = 'sess_' + Date.now();
            renderChat();
        }

        async function loadSession(sid) {
            chatSessionId = sid;
            renderChat();
        }

        function appendChatMsg(sender, text) {
            const container = document.getElementById('chat-messages');
            if (!container) return;
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = `<div><div class="msg-bubble">${escHtml(text)}</div><div class="msg-time">${now()}</div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'msg bot'; div.id = 'typing-indicator';
            div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

        async function sendChatMsg() {
            const inp = document.getElementById('chat-input');
            const text = inp.value.trim();
            if (!text) return;
            inp.value = ''; inp.style.height = 'auto';

            const btn = document.getElementById('chat-send-btn');
            btn.disabled = true;
            appendChatMsg('user', text);
            showTyping();

            try {
                const data = await apiFetch('/chat/', {
                    method: 'POST',
                    body: JSON.stringify({ session_id: chatSessionId, message: text })
                });
                hideTyping();
                appendChatMsg('bot', data.response || 'I received your message.');
            } catch (e) {
                hideTyping();
                appendChatMsg('bot', 'Sorry, I encountered an error. Please try again.');
            } finally {
                btn.disabled = false;
            }
        }

        async function sendFile(inp) {
            const file = inp.files[0]; if (!file) return;
            appendChatMsg('user', `📎 Uploading: ${escHtml(file.name)}…`);
            showTyping();
            try {
                const fd = new FormData();
                fd.append('file', file);
                fd.append('session_id', chatSessionId);
                const token = getToken();
                const res = await fetch(API + '/chat/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
                const data = await res.json();
                hideTyping();
                appendChatMsg('bot', data.message || 'File uploaded and is being analyzed.');
            } catch (e) {
                hideTyping();
                appendChatMsg('bot', 'File upload failed.');
            }
            inp.value = '';
        }

          </button>
          <button class="btn btn-sm" style="background:rgba(245,166,35,.12);color:var(--amber);" onclick="document.getElementById('audio-inp').click()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
            Transcribe Audio
          </button>
        </div>
        <input type="file" id="file-upload-inp" class="hidden" accept="image/*,video/*,.pdf,.doc,.docx" onchange="uploadFile(this,'upload')" />
        <input type="file" id="ocr-inp"          class="hidden" accept="image/*,.pdf"                    onchange="uploadFile(this,'ocr')"    />
        <input type="file" id="audio-inp"         class="hidden" accept="audio/*"                         onchange="uploadFile(this,'audio')"  />
        <div id="file-alert" class="hidden"></div>
      </div>
      <div class="files-grid fade-in" id="files-grid">
        ${files.length ? files.map(f => fileCard(f)).join('') : emptyState(iconFiles(), 'No files yet', 'Upload your medical documents to get started.')}
      </div>`;
            } catch (e) { main.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
        }

        function fileCard(f) {
            const icons = { image: `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>`, pdf: `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>` };
            const icon = icons[f.file_type] || `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>`;
            return `
    <div class="file-card">
      <div class="file-card-icon">${icon}</div>
      <h4 title="${escHtml(f.file_name)}">${escHtml(f.file_name)}</h4>
      <p>${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</p>
      <div class="file-card-actions">
        ${f.drive_view_link ? `<a href="${f.drive_view_link}" target="_blank" class="btn btn-secondary btn-sm">View</a>` : ''}
        <button class="btn btn-danger btn-sm" onclick="deleteFile(${f.id})">Delete</button>
      </div>
    </div>`;
        }

        async function uploadFile(inp, type) {
            const file = inp.files[0]; if (!file) return;
            const alertEl = document.getElementById('file-alert');
            alertEl.className = 'alert alert-success'; alertEl.textContent = 'Uploading…'; alertEl.classList.remove('hidden');
            const fd = new FormData();
            let endpoint = '/media/upload/';
            if (type === 'ocr') { fd.append('file', file); endpoint = '/ocr/analyze'; }
            if (type === 'audio') { fd.append('audio', file); endpoint = '/transcribe/'; }
            if (type === 'upload') { fd.append('file', file); endpoint = '/media/upload/'; }
            try {
                const token = getToken();
                const res = await fetch(API + endpoint, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
                if (!res.ok) throw new Error('Upload failed');
                alertEl.textContent = type === 'ocr' ? 'Document scanned!' : type === 'audio' ? 'Audio transcribed!' : 'File uploaded!';
                setTimeout(() => renderFiles(), 1200);
            } catch (e) {
                alertEl.className = 'alert alert-error'; alertEl.textContent = e.message;
            }
            inp.value = '';
        }

        async function deleteFile(id) {
            if (!confirm('Delete this file?')) return;
            try { await apiFetch(`/media/${id}`, { method: 'DELETE' }); renderFiles(); }
            catch (e) { alert(e.message); }
        }

        /* ════════════════════════════════════════════════
           PROFILE
        ════════════════════════════════════════════════ */
        async function renderProfile() {
            const main = document.getElementById('app-main');
            main.style.padding = ''; main.style.overflow = ''; main.style.height = '';
            let profile = {};
            try { profile = await apiFetch('/users/me/profile/'); } catch (e) { }

            const initials = (profile.full_name || currentUser.email || '?').slice(0, 2).toUpperCase();
            main.innerHTML = `
    <div style="max-width:700px;">
      <div class="profile-header-card card fade-in" style="margin-bottom:20px;">
        <div class="profile-avatar-wrap" onclick="document.getElementById('avatar-inp').click()">
          <div class="profile-avatar" id="profile-avatar-el">
            ${profile.profile_pic_drive_id
                    ? `<img src="http://127.0.0.1:8000/media/view/${profile.id}" onerror="this.parentElement.textContent='${initials}'" />`
                    : initials}
          </div>
          <div class="profile-cam"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
        </div>
        <input type="file" id="avatar-inp" class="hidden" accept="image/*" onchange="uploadAvatar(this)" />
        <div class="profile-header-info">
          <h2>${escHtml(profile.full_name || currentUser.email)}</h2>
          <p style="color:var(--txt2);font-size:13px;">${escHtml(currentUser.email)} &bull; Patient</p>
        </div>
      </div>

      <div id="profile-alert" class="hidden" style="margin-bottom:16px;"></div>

      <div class="card fade-in">
        <div style="font-size:15px;font-weight:600;margin-bottom:18px;">Profile Information</div>
        <div class="profile-form-grid">
          <div>
            <label>Full Name</label>
            <input type="text" id="pf-name" value="${escHtml(profile.full_name || '')}" placeholder="Your full name" />
          </div>
          <div>
            <label>Contact Number</label>
            <input type="tel" id="pf-phone" value="${escHtml(profile.contact_no || '')}" placeholder="+1 555 000 0000" />
          </div>
          <div>
            <label>Blood Group</label>
            <select id="pf-blood">
              ${['', 'A+', 'A-', 'B+', 'B-', 'O+', 'O-', 'AB+', 'AB-'].map(b => `<option ${profile.blood_group === b ? 'selected' : ''}>${b}</option>`).join('')}
            </select>
          </div>
          <div>
            <label>Status</label>
            <select id="pf-status">
              <option value="mild"     ${profile.current_status === 'mild' ? 'selected' : ''}>Mild</option>
              <option value="moderate" ${profile.current_status === 'moderate' ? 'selected' : ''}>Moderate</option>
              <option value="severe"   ${profile.current_status === 'severe' ? 'selected' : ''}>Severe</option>
              <option value="critical" ${profile.current_status === 'critical' ? 'selected' : ''}>Critical</option>
            </select>
          </div>
          <div class="col-span-2">
            <label>Address</label>
            <input type="text" id="pf-address" value="${escHtml(profile.address || '')}" placeholder="Your address" />
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:20px;">
          <button class="btn btn-primary" id="save-profile-btn" onclick="saveProfile()">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Save Changes
          </button>
        </div>
      </div>
    </div>`;
        }

        async function saveProfile() {
            const btn = document.getElementById('save-profile-btn');
            const alertEl = document.getElementById('profile-alert');
            btn.disabled = true; btn.textContent = 'Saving…';
            try {
                await apiFetch('/users/me/profile/', {
                    method: 'POST',
                    body: JSON.stringify({
                        full_name: document.getElementById('pf-name').value,
                        contact_no: document.getElementById('pf-phone').value,
                        address: document.getElementById('pf-address').value,
                        blood_group: document.getElementById('pf-blood').value,
                        current_status: document.getElementById('pf-status').value,
                    })
                });
                alertEl.className = 'alert alert-success'; alertEl.textContent = 'Profile saved successfully.'; alertEl.classList.remove('hidden');
                setTimeout(() => alertEl.classList.add('hidden'), 3000);
            } catch (e) {
                alertEl.className = 'alert alert-error'; alertEl.textContent = e.message; alertEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Save Changes`;
            }
        }

        async function uploadAvatar(inp) {
            const file = inp.files[0]; if (!file) return;
            const fd = new FormData(); fd.append('file', file);
            try {
                const token = getToken();
                const res = await fetch(API + '/users/me/profile-pic/', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
                if (!res.ok) throw new Error('Upload failed');
                renderProfile();
            } catch (e) { alert(e.message); }
            inp.value = '';
        }

        /* ════════════════════════════════════════════════
           DOCTOR ROSTER
        ════════════════════════════════════════════════ */
        let rosterAll = [];
        async function renderRoster() {
            const main = document.getElementById('app-main');
            main.style.padding = ''; main.style.overflow = ''; main.style.height = '';
            try {
                rosterAll = await apiFetch('/doctor/patients/');
                renderRosterTable(rosterAll);
            } catch (e) { main.innerHTML = `<div class="alert alert-error">${e.message}</div>`; }
        }

        function renderRosterTable(patients) {
            const main = document.getElementById('app-main');
            main.innerHTML = `
    <div style="margin-bottom:20px;" class="fade-in">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">Patient Roster</h2>
      <div class="roster-filters">
        <div class="input-wrap" style="flex:1;max-width:280px;">
          <svg class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search patients…" oninput="filterRoster(this.value)" />
        </div>
      </div>
    </div>
    <div class="roster-table-wrap fade-in">
      <table>
        <thead><tr>
          <th>Patient</th>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr></thead>
        <tbody>
          ${patients.length ? patients.map(p => `
            <tr class="patient-row">
              <td>
                <div class="patient-name-cell">
                  <div class="patient-initials">${(p.email || '?')[0].toUpperCase()}</div>
                  <div>
                    <div style="font-weight:500;">${escHtml(p.profile?.full_name || 'No profile')}</div>
                  </div>
                </div>
              </td>
              <td style="color:var(--txt2);">${escHtml(p.email)}</td>
              <td><span class="badge badge-green">${p.role?.value || p.role}</span></td>
              <td><button class="btn btn-secondary btn-sm" onclick="viewPatientTimeline(${p.id})">View Timeline</button></td>
            </tr>`).join('')
                    : `<tr><td colspan="4">${emptyState(iconUsers(), 'No patients found', 'No patients are assigned yet.')}</td></tr>`}
        </tbody>
      </table>
    </div>`;
        }

        function filterRoster(q) {
            const filtered = rosterAll.filter(p =>
                (p.email || '').toLowerCase().includes(q.toLowerCase()) ||
                (p.profile?.full_name || '').toLowerCase().includes(q.toLowerCase())
            );
            renderRosterTable(filtered);
        }

        async function viewPatientTimeline(patientId) {
            const main = document.getElementById('app-main');
            main.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
      <button class="btn btn-secondary btn-sm" onclick="navigateTo('roster')">← Back</button>
      <h2 style="font-size:18px;font-weight:700;">Patient Timeline</h2>
    </div>
    <div class="page-loader"><div class="loader-ring"></div></div>`;
            try {
                const timeline = await apiFetch(`/doctor/patients/${patientId}/summaries`);
                const content = timeline.length
                    ? timeline.map(t => `
          <div class="card" style="margin-bottom:14px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div style="font-weight:600;font-size:14px;">${escHtml(t.title)}</div>
              <span class="badge ${t.type === 'triage_summary' ? 'badge-purple' : 'badge-green'}">${t.type === 'triage_summary' ? 'AI Triage' : 'Medical Record'}</span>
            </div>
            <div style="color:var(--txt2);font-size:12px;margin-bottom:10px;">${t.created_at ? new Date(t.created_at).toLocaleString() : ''}</div>
            ${t.priority_score != null ? `<div style="font-size:13px;margin-bottom:6px;">Priority Score: <strong>${t.priority_score}</strong></div>` : ''}
            ${t.content?.transcript ? `<div style="font-size:13px;color:var(--txt2);max-height:80px;overflow:hidden;">${escHtml(t.content.transcript.slice(0, 200))}…</div>` : ''}
            ${t.content?.url ? `<a href="${t.content.url}" target="_blank" style="color:var(--primary);font-size:13px;">View File</a>` : ''}
          </div>`).join('')
                    : emptyState(iconFiles(), 'No records yet', 'This patient has no timeline entries.');
                main.querySelector('.page-loader').outerHTML = `<div class="fade-in">${content}</div>`;
            } catch (e) {
                main.innerHTML += `<div class="alert alert-error">${e.message}</div>`;
            }
        }

        /* ════════════════════════════════════════════════
           ICONS (inline SVG helpers)
        ════════════════════════════════════════════════ */
        function svg(path, c = 'currentColor') { return `<svg fill="none" viewBox="0 0 24 24" stroke="${c}" width="18" height="18">${path}</svg>`; }
        function iconHome(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>`, c); }
        function iconChat(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>`, c); }
        function iconCalendar(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>`, c); }
        function iconFiles(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>`, c); }
        function iconUser(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>`, c); }
        function iconUsers(c) { return svg(`<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>`, c); }
        function iconClock() { return `<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`; }

        /* ════════════════════════════════════════════════
           HELPERS
        ════════════════════════════════════════════════ */
        function isDoc() {
            if (!currentUser) return false;
            const r = currentUser.role;
            return r === 'doctor' || (r && r.value === 'doctor');
        }
        function now() { return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
        function escHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function emptyState(icon, title, sub) {
            return `<div class="empty-state"><div style="color:var(--txt2);margin:0 auto 14px;display:flex;justify-content:center;">${icon}</div><h3>${escHtml(title)}</h3><p>${escHtml(sub)}</p></div>`;
        }

        /* ════════════════════════════════════════════════
           INIT — restore session from token
        ════════════════════════════════════════════════ */
        (function init() {
            const token = getToken();
            if (token) {
                const payload = decodeJwt(token);
                if (payload && payload.exp * 1000 > Date.now()) {
                    currentUser = { user_id: payload.user_id, email: payload.email, role: payload.role };
                    launchApp();
                    return;
                }
                clearToken();
            }
            // Show auth
            document.getElementById('page-auth').style.display = 'flex';
            // Allow enter key on login
            document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
            document.getElementById('login-email').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        })();
    </script>
</body>

</html>
