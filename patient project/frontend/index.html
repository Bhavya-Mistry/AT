<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediConnect Tester</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>MediConnect API Tester</h1>
            <div id="auth-status">Not logged in</div>
            <button id="logout-btn" class="hidden" onclick="logout()">Logout</button>
        </header>

        <section id="auth-section">
            <div class="card">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
            </div>
            <div class="card">
                <h2>Register Patient</h2>
                <form id="register-form">
                    <input type="email" id="reg-email" placeholder="Email" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <button type="submit">Register</button>
                </form>
            </div>
        </section>

        <section id="patient-section" class="hidden">
            <h2>Patient Dashboard</h2>
            
            <div class="card">
                <h3>Profile Management</h3>
                <form id="profile-form">
                    <input type="text" id="prof-name" placeholder="Full Name" required>
                    <input type="text" id="prof-contact" placeholder="Contact No" required>
                    <input type="text" id="prof-address" placeholder="Address" required>
                    <input type="text" id="prof-blood" placeholder="Blood Group" required>
                    <select id="prof-status">
                        <option value="mild">Mild</option>
                        <option value="critical">Critical</option>
                        <option value="past_record">Past Record</option>
                    </select>
                    <button type="submit">Update Profile</button>
                </form>
            </div>

            <div class="card">
                <h3>AI Triage Chat</h3>
                <div id="chat-box"></div>
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Type a message (Type SUMMARIZE to end)" required>
                    <button type="submit">Send</button>
                </form>
                <form id="chat-upload-form" style="margin-top: 10px;">
                    <input type="file" id="chat-file" accept="image/*,.pdf" required>
                    <button type="submit">Upload to Chat</button>
                </form>
            </div>

            <div class="card">
                <h3>Media & Tools</h3>
                <div class="grid-2">
                    <div>
                        <h4>Upload Audio (Transcription)</h4>
                        <input type="file" id="audio-file" accept="audio/*">
                        <button onclick="uploadMedia('audio-file', '/transcribe/')">Transcribe</button>
                    </div>
                    <div>
                        <h4>Upload Medical Document (OCR)</h4>
                        <input type="file" id="ocr-file" accept="image/*,.pdf">
                        <button onclick="uploadMedia('ocr-file', '/ocr/analyze')">Analyze OCR</button>
                    </div>
                    <div>
                        <h4>Upload Generic Media</h4>
                        <input type="file" id="generic-file">
                        <button onclick="uploadMedia('generic-file', '/media/upload/')">Upload</button>
                    </div>
                </div>
                <button onclick="fetchMyMedia()" style="margin-top:10px;">Load My Media</button>
                <ul id="media-list"></ul>
            </div>
        </section>

        <section id="doctor-section" class="hidden">
            <h2>Doctor Dashboard</h2>
            <div class="card">
                <button onclick="fetchPatients()">Load Patients</button>
                <ul id="patient-list"></ul>
            </div>

            <div class="card" id="prescription-card" class="hidden">
                <h3>Issue Prescription</h3>
                <p><strong>Session ID:</strong> <span id="rx-session-id">None</span></p>
                <form id="prescription-form">
                    <textarea id="rx-notes" placeholder="Doctor Notes & Prescription" required></textarea>
                    <input type="number" id="rx-followup" placeholder="Follow-up Days" value="3" required>
                    <button type="submit">Generate Prescription PDF</button>
                </form>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
